site_name: RoadScan-MA
site_description: Détection automatique des dégradations routières avec IA pour les municipalités marocaines
site_author: Mohamed Amine Belasri et Yahya Amajane
site_url: https://roadscan-ma.readthedocs.io

repo_name: Mohamedaminebelasri/RoadScan-MA
repo_url: https://github.com/Mohamedaminebelasri/RoadScan-MA

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Mode clair
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Accueil: index.md
  - Installation: installation.md
  - Guide d'utilisation: usage.md
  - Architecture technique: architecture.md
  - Module RAG / IA: rag.md
  - Référence API: api.md

plugins:
  - search:
      lang: fr

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Mohamedaminebelasri/RoadScan-MA
    - icon: fontawesome/brands/kaggle
      link: https://www.kaggle.com/datasets/mohamedaminebelasri7/roadscan-dataset

copyright: "ENSAM Meknès — Projet académique IATD 2026 — Mohamed Amine Belasri & Yahya Amajane"
